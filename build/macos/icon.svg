<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Luma Aurora primary: violet -> blue -> cyan -->
    <linearGradient id="aurora" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="512" cy="512" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- macOS squircle-ish rounded background -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="url(#aurora)"/>
  <!-- subtle top sheen -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="#FFFFFF" opacity="0.06"/>

  <!-- glow behind the mark -->
  <circle cx="512" cy="512" r="360" fill="url(#starGlow)"/>

  <!-- soft shadow of the star for depth -->
  <path d="M 512.00,212.00 C 542.00,382.10 641.90,482.00 812.00,512.00 C 641.90,542.00 542.00,641.90 512.00,812.00 C 482.00,641.90 382.10,542.00 212.00,512.00 C 382.10,482.00 482.00,382.10 512.00,212.00 Z"
        fill="#0B1020" opacity="0.18" filter="url(#soft)" transform="translate(0,10)"/>
  <!-- the four-point aurora sparkle, brand geometry, white -->
  <path d="M 512.00,212.00 C 542.00,382.10 641.90,482.00 812.00,512.00 C 641.90,542.00 542.00,641.90 512.00,812.00 C 482.00,641.90 382.10,542.00 212.00,512.00 C 382.10,482.00 482.00,382.10 512.00,212.00 Z"
        fill="#FFFFFF"/>
</svg>
